services:
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: bi_app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=bi_dashboard
      - DB_USER=bi_user
      - DB_PASS=bi_password

  db:
    image: mysql:8.0
    container_name: bi_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bi_dashboard
      MYSQL_USER: bi_user
      MYSQL_PASSWORD: bi_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
