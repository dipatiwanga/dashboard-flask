<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or 'Dashboard' }} — {{ app_name }}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────── -->
<div class="d-flex" id="wrapper">

    <nav id="sidebar" class="d-flex flex-column flex-shrink-0 p-3">
        <!-- Logo / Brand -->
        <a href="{{ url_for('index') }}" class="brand-link d-flex align-items-center mb-4 text-decoration-none">
            <i class="bi bi-bar-chart-fill me-2 brand-icon"></i>
            <span class="brand-text">{{ app_name }}</span>
        </a>

        <hr class="sidebar-divider">

        <!-- Navigation -->
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="{{ url_for('index') }}"
                   class="nav-link {{ 'active' if request.endpoint == 'index' else '' }}">
                    <i class="bi bi-speedometer2 me-2"></i>
                    Overview
                </a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('sales_index') }}"
                   class="nav-link {{ 'active' if request.endpoint == 'sales_index' else '' }}">
                    <i class="bi bi-table me-2"></i>
                    Sales Data
                </a>
            </li>
        </ul>

        <hr class="sidebar-divider">

        <!-- Footer info -->
        <div class="sidebar-footer text-muted small">
            <i class="bi bi-circle-fill text-success me-1" style="font-size:.5rem"></i>
            Connected · MySQL
        </div>
    </nav>

    <!-- ── Main Content ──────────────────────────────────── -->
    <div id="page-content" class="flex-grow-1">

        <!-- Top Navbar -->
        <nav class="navbar navbar-expand-lg top-navbar px-4">
            <button class="btn btn-sm sidebar-toggle me-3" id="sidebarToggle" title="Toggle sidebar">
                <i class="bi bi-list fs-5"></i>
            </button>
            <span class="navbar-brand mb-0 h6 text-muted">
                {{ title or 'Dashboard' }}
            </span>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-muted small">
                    <i class="bi bi-calendar3 me-1"></i>
                    {{ current_date }}
                </span>
            </div>
        </nav>

        <!-- Page Body -->
        <main class="p-4">
            {% block content %}{% endblock %}
        </main>

    </div><!-- /#page-content -->
</div><!-- /#wrapper -->

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
